title: Renhao Huang's Personal Blog
baseurl: /
permalink: "/:title/"
collections:
  posts:
    permalink: "/posts/:title/"
description: Explore the new world
color_scheme: light
accent_color: pink
header:
  title: Renhao Huang
  has_nav: true
  nav_links:
    - label: Home
      url: /
      style: link
    - label: Projects
      url: /portfolio/
      style: link
    - label: Blog
      url: /blog/
      style: link
    - label: CV
      url: /cv/
      style: link
    - label: About
      url: /about/
      style: link
    - label: Contact
      url: /contact/
      style: link
footer:
  content: "&copy; Renhao Huang. All rights reserved."
  # links:
  #   - label: Made with Stackbit.
  #     url: "https://www.stackbit.com"
  #     style: link
  #     new_window: true
  has_social: true
  social_links:
    - label: GitHub
      url: "https://github.com/HRHLALALA"
      style: icon
      icon_class: fa-github
      new_window: true
    - label: Instagram
      url: "https://www.instagram.com/"
      style: icon
      icon_class: fa-instagram
      new_window: true
    - label: Dribbble
      url: "https://dribbble.com/"
      style: icon
      icon_class: fa-envelope
      new_window: true
    - label: LinkedIn
      url: "https://www.linkedin.com/"
      style: icon
      icon_class: fa-linkedin
      new_window: true
sass:
  indentWidth: 4
  style: nested
  precision: 10

# Where things are
jekyll-spaceship:
  # default enabled processors
  processors:
    - table-processor
    - mathjax-processor
    - plantuml-processor
    - mermaid-processor
    - polyfill-processor
    - media-processor
    - emoji-processor
    - element-processor
  mathjax-processor:
    src:
      - https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-AMS_SVG-full

    config:
      tex:
        inlineMath:
          - ["$", "$"]
          - ['\(', '\)']
        displayMath:
          - ["$$", "$$"]
          - ['\[', '\]']
        equationNumbers: { autoNumber: "AMS" }
      svg:
        fontCache: "global"
    optimize: # optimization on building stage to check and add mathjax scripts
      enabled: true # value `false` for adding to all pages
      include: [] # include patterns for math expressions checking (regexp)
      exclude: [] # exclude patterns for math expressions checking (regexp)
  plantuml-processor:
    mode: default # mode value 'pre-fetch' for fetching image at building stage
    css:
      class: plantuml
    syntax:
      code: "plantuml!"
      custom: ["@startuml", "@enduml"]
    src: http://www.plantuml.com/plantuml/svg/
  mermaid-processor:
    mode: default # mode value 'pre-fetch' for fetching image at building stage
    css:
      class: mermaid
    syntax:
      code: "mermaid!"
      custom: ["@startmermaid", "@endmermaid"]
    config:
      theme: default
    src: https://mermaid.ink/svg/
  media-processor:
    default:
      id: "media-{id}"
      class: "media"
      width: "100%"
      height: 350
      frameborder: 0
      style: "max-width: 600px; outline: none;"
      allow: "encrypted-media; picture-in-picture"
  emoji-processor:
    css:
      class: emoji
    src: https://github.githubassets.com/images/icons/emoji/

plugins:
  - jekyll-menus
  - jekyll-toc
  - jekyll-spaceship

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - LICENSE.md
  - README.md
  - netlify.toml
  - stackbit-build.sh
  - stackbit-pull.js
