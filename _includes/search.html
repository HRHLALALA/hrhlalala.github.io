<link rel="stylesheet" href="{{site.url}}/assets/css/search.css">

<div id="search-container">
    <input type="text" id="search-input" placeholder="Search...">

    <ul id="results-container"></ul>
</div>
<script src="{{ site.url }}/assets/js/simple-jekyll-search.min.js"></script>
<script>
    
    window.simpleJekyllSearch = new SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('results-container'),
        json: '{{ site.url }}/search.json',
        searchResultTemplate: '<li ><a class="dropdown-item" href="{{site.url}}{url}">{title}<p>{url}</p></a></li>',
        noResultsText: 'No results found',
        limit: 8,
        fuzzy: true,
        exclude: ['Renhao Huang', 'Projects', 'About Me', 'Contact'],
        success: function (data) {
            console.log("search component success data： " + data);
        }
    })
</script>
